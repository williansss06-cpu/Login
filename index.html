<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frete Inteligente - Acesso</title>

<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #0f172a; color: #fff; }
.wrapper { min-height: 100vh; display: grid; grid-template-columns: 1.2fr 1fr; }
.hero { position: relative; overflow: hidden; display: flex; align-items: center; padding: 60px; }
.hero video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.28; }
.overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(15,23,42,.75), rgba(15,118,110,.45)); }
.hero-content { position: relative; z-index: 2; max-width: 560px; }
.tag { display: inline-block; padding: 8px 14px; border-radius: 999px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); margin-bottom: 18px; font-size: 13px; font-weight: 700; }
.logo { font-size: 44px; font-weight: 800; margin-bottom: 16px; color: #34d399; }
.subtitle { font-size: 18px; line-height: 1.65; color: #e2e8f0; margin-bottom: 24px; }
.bullets { color: #cbd5e1; line-height: 1.9; font-size: 15px; }
.panel { background: #f8fafc; color: #0f172a; display: flex; align-items: center; justify-content: center; padding: 40px; }
.card { width: 100%; max-width: 460px; background: #fff; border-radius: 18px; padding: 30px; box-shadow: 0 20px 50px rgba(15,23,42,.12); }
h2 { margin: 0 0 20px; font-size: 30px; }
p.helper { margin: 0 0 20px; color: #64748b; font-size: 14px; }
input, select { width: 100%; padding: 14px 15px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 12px; font-size: 14px; }
button { width: 100%; border: none; background: #0f766e; color: #fff; padding: 14px 16px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }
button:hover { background: #115e59; }
.aba { flex: 1; text-align: center; padding: 10px; border-radius: 10px; background: #f1f5f9; color: #64748b; cursor: pointer; font-weight: bold; }
.aba.ativa { background: #0f766e; color: white; }
.escondido { display: none; }
.msg { font-size: 13px; color: red; margin-top: 5px; }
.sucesso { color: green; }
</style>
</head>

<body>

<div class="wrapper">
  <section class="hero">
    <video autoplay muted loop playsinline>
      <source src="https://cdn.coverr.co/videos/coverr-trucks-driving-on-the-highway-3987/1080p.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="hero-content">
      <div class="tag">🚚 Plataforma SaaS Logística</div>
      <div class="logo">Frete Inteligente</div>
      <div class="subtitle">
        Plataforma para <b>simulação, negociação e gestão de fretes dedicados</b>
      </div>
      <div class="bullets">
        ✔ Simulação de frete<br>
        ✔ Gestão por cliente (CNPJ)<br>
        ✔ Controle de usuários<br>
        ✔ Dashboard executivo
      </div>
    </div>
  </section>

  <section class="panel">
    <div class="card">

      <div class="abas">
        <div class="aba ativa" onclick="mostrarAba('login')">🔐 Login</div>
        <div class="aba" onclick="mostrarAba('cadastro')">📝 Cadastrar</div>
      </div>

      <div id="abaLogin">
        <input id="login_email" type="email" placeholder="Email" />
        <input id="login_senha" type="password" placeholder="Senha" />
        <button onclick="login()">Entrar no sistema</button>
        <div id="msg_login" class="msg"></div>
      </div>

      <div id="abaCadastro" class="escondido">
        <input id="cadastro_cnpj" placeholder="CNPJ" />
        <input id="cadastro_nome" placeholder="Nome" />
        <input id="cadastro_email" placeholder="Email" />
        <input id="cadastro_senha" placeholder="Senha" type="password"/>
        <button onclick="cadastrarUsuario()">Cadastrar</button>
        <div id="msg_cadastro" class="msg"></div>
      </div>

    </div>
  </section>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// CONFIG
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  databaseURL: "https://rota-22c3b-default-rtdb.firebaseio.com/",
  projectId: "SEU_PROJECT_ID"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();

// ABAS
function mostrarAba(aba) {
  document.getElementById('abaLogin').classList.toggle('escondido', aba !== 'login');
  document.getElementById('abaCadastro').classList.toggle('escondido', aba !== 'cadastro');
}

// LOGIN
async function login() {
  const email = document.getElementById("login_email").value.trim();
  const senha = document.getElementById("login_senha").value.trim();
  const msg = document.getElementById("msg_login");

  msg.innerHTML = "";

  if (!email || !senha) {
    msg.innerHTML = "Preencha e-mail e senha.";
    return;
  }

  try {
    const snap = await db.ref("usuarios").once("value");
    let user = null;

    snap.forEach(c => {
      const u = c.val();
      if (u.email === email && u.senha === senha) {
        user = { ...u, id: c.key };
      }
    });

    if (!user) {
      msg.innerHTML = "E-mail ou senha inválidos.";
      return;
    }

    if (user.status === "pendente") {
      msg.innerHTML = "Aguardando liberação.";
      return;
    }

    localStorage.setItem("usuario_id", user.id);
    localStorage.setItem("perfil", user.perfil || "");

    // 👉 CAMINHO CORRETO PARA GITHUB
    window.location.href = "../empresa/index.html";

  } catch (error) {
    console.error(error);
    msg.innerHTML = "Erro ao acessar.";
  }
}

// CADASTRO
async function cadastrarUsuario() {
  const nome = cadastro_nome.value.trim();
  const email = cadastro_email.value.trim();
  const senha = cadastro_senha.value.trim();
  const cnpj = cadastro_cnpj.value.trim();
  const msg = document.getElementById("msg_cadastro");

  msg.innerHTML = "";

  if (!email || !senha) {
    msg.innerHTML = "Preencha os campos obrigatórios.";
    return;
  }

  try {
    await db.ref("usuarios").push({
      nome,
      email,
      senha,
      cnpj,
      perfil: "admin_empresa",
      status: "pendente",
      data_cadastro: Date.now()
    });

    msg.className = "msg sucesso";
    msg.innerHTML = "Cadastro realizado! Aguarde liberação.";

  } catch (error) {
    console.error(error);
    msg.innerHTML = "Erro ao cadastrar.";
  }
}
</script>

</body>
</html>
